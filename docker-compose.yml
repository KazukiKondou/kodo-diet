services:
  db:
    image: postgres:16-alpine
    container_name: kodo-diet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kodo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kodo_diet
    volumes:
      - kodo-diet-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kodo"]
      interval: 5s
      timeout: 3s
      retries: 20
  app:
    build: .
    container_name: kodo-diet
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3015:3015"
    volumes:
      - kodo-diet-uploads:/app/uploads
volumes:
  kodo-diet-db:
  kodo-diet-uploads:
